name: php-patch-build

ddev_version_constraint: ">= v1.24.10"

project_files:
  - docker-compose.php-patch-build.yaml
  - web-build/Dockerfile.php-patch-build

pre_install_actions:
  - |
    #ddev-description:Removing old files
    rm -f "${DDEV_APPROOT}/.ddev/config.php-patch-build.yaml" "${DDEV_APPROOT}/.ddev/web-build/pre.Dockerfile.php-patch-build"

post_install_actions:
  - |
    if [ "${STATIC_PHP_VERSION:-}" = "" ]; then
      printf "\n\nPlease enter the PHP patch version you want to use, like 7.4.23 or 8.0.10:"
    fi
  - |
    #ddev-description:Set PHP patch version
    if [ "${STATIC_PHP_VERSION:-}" = "" ]; then
      read STATIC_PHP_VERSION
      ddev dotenv set .ddev/.env.php-patch-build --static-php-version="${STATIC_PHP_VERSION}"
    else
      echo "STATIC_PHP_VERSION=\"${STATIC_PHP_VERSION}\""
    fi

removal_actions:
  - rm -f ${DDEV_APPROOT}/.ddev/.env.php-patch-build
